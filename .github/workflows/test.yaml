---
name: test

on:
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    name: Run a test
    steps:
      - id: source-checkout
        name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - id: test
        name: Test the docker build
        run: ./test.sh
        shell: bash
